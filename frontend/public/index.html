                "text": "Yes. We provide premium chauffeured airport transfers to and from San Francisco International (SFO), Oakland International (OAK), and San Jose International (SJC) airports. Our chauffeurs monitor your flight number in real time and adjust pickup automatically if your flight is delayed — at no extra charge. A 15-minute grace period applies after domestic landings (45 minutes for international)."

            },

              "@type": "Question",
              "name": "What is the Meet & Greet service?",
              "acceptedAnswer": {
                "@type": "Answer",

              }
            },

              "@type": "Question",
              "name": "What cities do you serve in the Bay Area?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "We serve the entire San Francisco Bay Area including San Francisco, the Peninsula (Burlingame, Millbrae, Hillsborough, Atherton, Menlo Park, Palo Alto), Silicon Valley (Mountain View, Sunnyvale, Cupertino, San Jose), the East Bay (Oakland, Berkeley, Emeryville, Walnut Creek), and Wine Country (Napa, Sonoma, Healdsburg, Calistoga, St. Helena)."
              }
            },
            {
              "@type": "Question",
              "name": "What is your cancellation policy?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Free cancellation with full refund 24+ hours before pickup. 50% refund 12–24 hours before. No refund for cancellations less than 12 hours before pickup or no-shows. Changes (date, time, vehicle, route) are free if requested 6+ hours before pickup. Airport bookings include flight-delay protection — delays are automatically accommodated and full refunds apply if the airline cancels your flight."
              }
            },
            {
              "@type": "Question",
              "name": "How are your rates calculated?",
              "acceptedAnswer": {
                "@type": "Answer",

              }
            }
